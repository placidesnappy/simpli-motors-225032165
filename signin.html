<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Simpli Motors</title>
    <link rel="stylesheet" href="globals.css">
</head>
<body class="auth-page">
    <header class="nav">
        <div class="logo">
            <span class="logo-text"><span class="pt1">Si</span><span class="pt2">mpli</span></span>
            <a href="index.html" class="logo-btn">Home</a>
        </div>
        <nav class="links">
            <a href="cars.html" class="main-link">Cars</a>
            <a href="#" class="main-link">Bikes</a>
            <a href="#" class="main-link">About</a>     
        </nav>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <h1 class="auth-title">System Access</h1>
            <p class="auth-subtitle">Initialize driver credentials</p>
            
            <form class="auth-form">
                <div class="input-group">
                    <label class="auth-label">Identifier</label>
                    <input type="email" class="auth-input" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group">
                    <label class="auth-label">Secure Key</label>
                    <input type="password" class="auth-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn">Establish Connection</button>
            </form>

            <div class="auth-footer">
                New to the grid? <a href="signup.html">Register Account</a>
            </div>
        </div>
    </main>
</body>
</html>
