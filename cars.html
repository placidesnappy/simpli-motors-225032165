<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>choose your car</title>
    <link rel="stylesheet" href="globals.css">
    <script src="cars-data.js"></script>
</head>
<body style="
    background-image: url('assets/background1.jpg');
    background-position: center center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: cover;
    min-height: 100vh;
    width: 100%;
">
    <nav class="nav">
        <div class="logo">
            <span class="logo-text"><span class="pt1">Si</span><span class="pt2">mpli</span></span>
            <div>
                <a href="index.html" class="nav-btn logo-btn">Home</a>
            </div>
        </div>
        <div class="links">
            <a href="cars.html" class="nav-btn main-link">Cars</a>
            <a href="bikes.html" class="nav-btn main-link">Bikes</a>
            <a href="about.html" class="nav-btn main-link">About</a>     
        </div>
    </nav>
    <section class="cars-main">
        <nav class="side-nav" id="side-nav-container">
            <!-- Brand navigation links will be dynamically populated -->
        </nav>
        <section class="cards">
            <iframe src="brand.html?brand=toyota" name="car-cards" width="100%" height="100%"></iframe>
        </section>
        <div class="next-section">
            >>
        </div>
    </section>

    <script>
        // Use basic JavaScript to loop and create elements
        const sideNav = document.getElementById('side-nav-container');
        sideNav.innerHTML = '';

        CARS_DATA.forEach(function(brand) {
            // Create navigation anchor
            const a = document.createElement('a');
            a.href = 'brand.html?brand=' + brand.id;
            a.target = 'car-cards';

            // Create image element
            const img = document.createElement('img');
            // Benz exception: logo filename is 'mercedes-benz'
            const logoName = (brand.id === 'benz') ? 'mercedes-benz' : brand.id;
            img.src = 'assets/logos/thumb/' + logoName + '.png';
            img.alt = brand.brand;
            a.appendChild(img);

            // Create span for brand name
            const span = document.createElement('span');
            span.textContent = brand.brand;
            a.appendChild(span);

            // Append to sidebar container
            sideNav.appendChild(a);
        });
    </script>
</body>
</html>
